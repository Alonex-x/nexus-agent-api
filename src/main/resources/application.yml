server:
  port: 8080

spring:
  application:
    name: nexus
  datasource:
    url: jdbc:postgresql://localhost:5432/nexusdb
    username: nexususer
    password: nexuspass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

nexus:
  security:
    api-key-header: X-Agent-Key
    heartbeat-timeout-seconds: 120
    scheduler-fixed-rate-ms: 60000
  rate-limit:
    events-per-minute: 60

---
# Perfil de test con H2 en memoria
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/nexusdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
nexus:
  security:
    cors:
      allowed-origins: "*"
